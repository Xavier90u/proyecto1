<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
        <!-- Tailwind CSS CDN -->
        <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
        <div class="min-h-screen flex items-center justify-center bg-gray-100">
            <div class="bg-white p-8 rounded shadow-md w-full max-w-sm">
                <h2 class="text-2xl font-bold mb-6 text-center">Login</h2>
                <form id="loginForm">
                    <div class="mb-4">
                        <label class="block text-gray-700 mb-2" for="username">Usuario</label>
                        <input class="w-full px-3 py-2 border rounded focus:outline-none focus:ring focus:border-blue-300" type="text" id="username" name="username" required>
                    </div>
                    <div class="mb-6">
                        <label class="block text-gray-700 mb-2" for="password">Contraseña</label>
                        <input class="w-full px-3 py-2 border rounded focus:outline-none focus:ring focus:border-blue-300" type="password" id="password" name="password" required>
                    </div>
                    <button class="w-full bg-blue-500 text-white py-2 rounded hover:bg-blue-600 transition" type="submit">Ingresar</button>
                    <p id="errorMsg" class="text-red-500 mt-4 text-center hidden">Usuario o contraseña incorrectos</p>
                </form>
            </div>
        </div>
        <script>
            // Usuario y contraseña de prueba
            const usuarioPrueba = "admin";
            const contrasenaPrueba = "1234";
            document.getElementById("loginForm").addEventListener("submit", function(e) {
                e.preventDefault();
                const username = document.getElementById("username").value;
                const password = document.getElementById("password").value;
                if (username === usuarioPrueba && password === contrasenaPrueba) {
                    window.location.href = "bienvenida.html";
                } else {
                    document.getElementById("errorMsg").classList.remove("hidden");
                }
            });
        </script>
</body>
</html>
